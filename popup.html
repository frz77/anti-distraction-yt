<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 180px; padding: 15px; font-family: 'Roboto', sans-serif; text-align: center; background: #0f0f0f; color: white; }
    h3 { font-size: 14px; margin-bottom: 15px; font-weight: 300; letter-spacing: 1px; }
    .toggle-btn {
      padding: 10px 20px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #aaa;
      cursor: pointer;
      border-radius: 4px;
      transition: 0.3s;
      width: 100%;
    }
    .toggle-btn.active { background: #fff; color: #000; border-color: #fff; }
  </style>
</head>
<body>
  <h3>ANTI DISTRACTION MODE</h3>
  <button id="toggleBtn" class="toggle-btn">Enabled</button>
  <script src="popup.js"></script>
</body>
</html>
